return(<div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:28,gap:18,background:C.bg,textAlign:"center"}}><div style={{fontSize:56}}>✅</div><div style={{fontFamily:"'Bebas Neue',cursive",fontSize:28,letterSpacing:3,color:C.green}}>YOU'RE BOOKED!</div><div style={{fontSize:13,color:C.muted}}>Esteban will see you at Shear Perfection 💈</div><div style={{background:"#111",border:`1px solid ${C.border}`,padding:18,width:"100%",maxWidth:360,textAlign:"left"}}>{[["Service",last?.service],["Date",last?.date],["Time",fmt12(last?.time)],["Duration",`${svc?.duration} min`],["Price",`$${last?.price}`],["Recurring",last?.recurring]].map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:`1px solid #1a1a1a`,fontSize:13}}><span style={{color:C.dim}}>{k}</span><span style={{color:C.text,fontWeight:500}}>{v}</span></div>)}</div><Btn onClick={()=>dlICS(last)} style={{width:"100%",maxWidth:360,padding:"14px",background:"#1a3a1a",color:C.green,border:`1px solid ${C.green}`,fontSize:14,fontFamily:"inherit"}}>📅 Save to Apple Calendar</Btn><Btn onClick={reset} style={{width:"100%",maxWidth:360,padding:"14px",background:C.red,color:"#fff",fontFamily:"'Bebas Neue',cursive",fontSize:18,letterSpacing:2}}>BOOK ANOTHER</Btn></div>);}
function Dashboard({bookings}){const sorted=[...bookings].sort((a,b)=>new Date(b.at)-new Date(a.at));const td=new Date().toDateString();const todayN=bookings.filter(b=>{try{return new Date(b.at).toDateString()===td;}catch{return false;}}).length;const recN=bookings.filter(b=>b.recurring&&b.recurring!=="One-time").length;const rev=bookings.reduce((s,b)=>s+(Number(b.price)||0),0);const[deleting,setDeleting]=useState(null);const doDelete=async id=>{setDeleting(id);try{await fbDelete(id);}catch{alert("Couldn't delete.");}setDeleting(null);};return(<div style={{height:"100%",overflowY:"auto",background:C.bg,padding:16}}><div style={{marginBottom:16}}><div style={{fontFamily:"'Bebas Neue',cursive",fontSize:24,letterSpacing:3,color:C.text}}>ESTEBAN'S <span style={{color:C.red}}>DASHBOARD</span></div><div style={{fontSize:10,color:C.dim,letterSpacing:2}}>🔴 LIVE · SYNCS ACROSS ALL DEVICES</div></div><div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:18}}>{[{l:"Total Bookings",v:bookings.length},{l:"Today",v:todayN},{l:"Recurring",v:recN},{l:"Est. Revenue",v:`$${rev}`}].map(s=><div key={s.l} style={{background:C.card,border:`1px solid ${C.border}`,padding:"12px 14px"}}><div style={{fontFamily:"'Bebas Neue',cursive",fontSize:30,color:C.red,lineHeight:1}}>{s.v}</div><div style={{fontSize:10,color:C.dim,letterSpacing:1,textTransform:"uppercase",marginTop:3}}>{s.l}</div></div>)}</div>{sorted.length===0?<div style={{textAlign:"center",padding:"40px 20px",border:`1px dashed ${C.border}`,color:C.dim}}><div style={{fontSize:32,marginBottom:8}}>📅</div><div style={{fontFamily:"'Bebas Neue',cursive",fontSize:18,letterSpacing:2,marginBottom:4}}>NO BOOKINGS YET</div><div style={{fontSize:13}}>Share your link so clients can start booking!</div></div>:<div style={{display:"flex",flexDirection:"column",gap:8}}>{sorted.map(b=>{const sv=SERVICES.find(s=>s.name===b.service);return(<div key={b._id} style={{background:C.card,border:`1px solid ${C.border}`,padding:"14px",display:"flex",gap:10,alignItems:"flex-start"}}><div style={{width:3,alignSelf:"stretch",background:C.red,flexShrink:0}}/><div style={{flex:1,minWidth:0}}><div style={{display:"flex",justifyContent:"space-between",gap:6,alignItems:"flex-start"}}><div><div style={{fontWeight:600,fontSize:15,color:C.text}}>{b.name}</div><div style={{fontSize:12,color:C.dim,marginTop:2}}>{b.phone}</div></div><div style={{background:C.red,color:"#fff",fontSize:11,fontWeight:700,padding:"3px 8px",flexShrink:0}}>${b.price}</div></div><div style={{fontSize:13,color:C.muted,marginTop:5}}>{b.service}</div><div style={{display:"flex",gap:12,marginTop:5,flexWrap:"wrap"}}><span style={{fontSize:12,color:C.dim}}>📅 {b.date}</span><span style={{fontSize:12,color:C.dim}}>🕐 {fmt12(b.time)}</span>{sv&&<span style={{fontSize:12,color:C.dim}}>⏱ {sv.duration} min</span>}</div>{b.recurring&&b.recurring!=="One-time"&&<div style={{fontSize:11,color:C.green,marginTop:4}}>🔁 {b.recurring}</div>}{b.notes&&<div style={{marginTop:7,padding:"5px 10px",background:"#111",fontSize:12,color:"#888",fontStyle:"italic"}}>✂️ {b.notes}</div>}<Btn onClick={()=>dlICS(b)} style={{marginTop:8,background:"none",border:`1px solid #1a3a1a`,color:C.green,padding:"4px 10px",fontSize:11,fontFamily:"inherit"}}>📅 Add to Calendar</Btn></div><Btn onClick={()=>doDelete(b._id)} disabled={deleting===b._id} style={{background:"none",border:`1px solid ${C.border}`,color:deleting===b._id?"#333":C.dim,padding:"6px 9px",fontSize:13,flexShrink:0,fontFamily:"inherit"}}>{deleting===b._id?"...":"✕"}</Btn></div>);})}</div>}</div>);}
function App(){const[settings,setSettings]=useLS("sp_settings_v3",DEF);const[view,setView]=useState("book");const[bookings,setBookings]=useState([]);const[ready,setReady]=useState(false);const[dbErr,setDbErr]=useState(false);useEffect(()=>{db.collection("_ping").doc("t").set({t:Date.now()}).then(()=>{setReady(true);db.collection("_ping").doc("t").delete();}).catch(()=>setDbErr(true));},[]);useEffect(()=>{if(!ready)return;return fbListen(setBookings);},[ready]);const tabs=[{id:"book",label:"💈 Book"},{id:"dash",label:`📋 Bookings${bookings.length?` (${bookings.length})`:""}`},{id:"settings",label:"⚙️ Settings"}];
if(dbErr)return(<div style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:C.bg,padding:32,textAlign:"center",gap:16}}><div style={{fontSize:40}}>⚠️</div><div style={{fontFamily:"'Bebas Neue',cursive",fontSize:20,letterSpacing:2,color:"#ff6b6b"}}>DATABASE ERROR</div><div style={{fontSize:13,color:C.dim,lineHeight:1.9,maxWidth:320}}>Go to Firebase Console → Firestore → Rules and replace everything with:</div><div style={{background:"#111",padding:"14px 16px",textAlign:"left",fontSize:12,color:C.green,fontFamily:"monospace",width:"100%",maxWidth:340,lineHeight:1.8}}>{"rules_version = '2';"}<br/>{"service cloud.firestore {"}<br/>&nbsp;&nbsp;{"match /databases/{database}/documents {"}<br/>&nbsp;&nbsp;&nbsp;&nbsp;{"match /{document=**} {"}<br/>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;{"allow read, write: if true;"}<br/>&nbsp;&nbsp;&nbsp;&nbsp;{"}"}<br/>&nbsp;&nbsp;{"}"}<br/>{"}"}</div><div style={{fontSize:13,color:C.dim}}>Tap Publish then refresh.</div></div>);
if(!ready)return(<div style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:C.bg,gap:16}}><div style={{fontSize:40}}>💈</div><Dots/><div style={{fontSize:13,color:C.dim}}>Connecting...</div></div>);
return(<div style={{width:"100%",height:"100vh",display:"flex",flexDirection:"column",fontFamily:"'DM Sans',sans-serif",background:C.bg,color:C.text}}><div style={{display:"flex",background:"#080808",borderBottom:"1px solid #1a1a1a",flexShrink:0}}>{tabs.map(t=><button key={t.id} onClick={()=>setView(t.id)} style={{flex:1,padding:"13px 4px",background:"none",border:"none",borderBottom:view===t.id?`3px solid ${C.red}`:"3px solid transparent",color:view===t.id?"#fff":C.dim,cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif",touchAction:"manipulation"}}>{t.label}</button>)}</div><div style={{flex:1,overflow:"hidden"}}>{view==="book"&&<BookForm allBookings={bookings} settings={settings}/>}{view==="dash"&&<Dashboard bookings={bookings}/>}{view==="settings"&&<Settings settings={settings} onSave={setSettings} onBack={()=>setView("dash")}/>}</div></div>);}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
