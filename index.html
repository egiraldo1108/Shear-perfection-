function slotsForBooking(b){
  var svc=SERVICES.find(function(s){return s.name===b.service;});
  var dur=svc?svc.duration:30;
  var parts=b.time.split(":");
  var bh=parseInt(parts[0]);var bmi=parseInt(parts[1]);
  var bStartMin=bh*60+bmi;
  var slots=[];
  for(var i=0;i<dur;i+=15){
    var tot=bStartMin+i;
    slots.push(b.date+"_"+String(Math.floor(tot/60)).padStart(2,"0")+":"+String(tot%60).padStart(2,"0"));
  }
  return slots;
}

function fbSaveOne(b){
  var slots=slotsForBooking(b);
  var locksCol=db.collection("_locks");
  var bookingsCol=db.collection("bookings");
  return db.runTransaction(function(tx){
    var lockRefs=slots.map(function(s){return locksCol.doc(s);});
    return Promise.all(lockRefs.map(function(r){return tx.get(r);})).then(function(lockDocs){
      if(lockDocs.some(function(d){return d.exists;}))throw new Error("SLOT_TAKEN");
      var newRef=bookingsCol.doc();
      tx.set(newRef,b);
      lockRefs.forEach(function(r){tx.set(r,{date:b.date,bookedAt:b.at});});
      return newRef;
    });
  }).catch(function(e){if(e.message==="SLOT_TAKEN")return null;throw e;});
}
