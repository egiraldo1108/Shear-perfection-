function slotsForBooking(b){
  const svc=SERVICES.find(s=>s.name===b.service),dur=svc?svc.duration:30;
  const[bh,bmi]=b.time.split(":").map(Number);
  const bStartMin=bh*60+bmi,slots=[];
  for(let i=0;i<dur;i+=15){
    const tot=bStartMin+i;
    slots.push(`${b.date}_${String(Math.floor(tot/60)).padStart(2,"0")}:${String(tot%60).padStart(2,"0")}`);
  }
  return slots;
}

async function fbSaveOne(b){
  const slots=slotsForBooking(b);
  const locksCol=db.collection("_locks"),bookingsCol=db.collection("bookings");
  try{
    return await db.runTransaction(async tx=>{
      const lockRefs=slots.map(s=>locksCol.doc(s));
      const lockDocs=await Promise.all(lockRefs.map(r=>tx.get(r)));
      if(lockDocs.some(d=>d.exists)) throw new Error("SLOT_TAKEN");
      const newRef=bookingsCol.doc();
      tx.set(newRef,b);
      lockRefs.forEach(r=>tx.set(r,{date:b.date,bookedAt:b.at}));
      return newRef;
    });
  }catch(e){
    if(e.message==="SLOT_TAKEN") return null;
    throw e;
  }
}

async function fbSave(b){

  const locksCol=db.collection("_locks"),bookingsCol=db.collection("bookings");

}

async function fbSaveSeries(baseBooking){
  const intervalDays=INTERVAL_DAYS[baseBooking.recurring];
  if(!intervalDays) return fbSave(baseBooking);
  const seriesId=uid();
  const now=new Date();
  const oneYearOut=new Date(now.getFullYear()+1,now.getMonth(),now.getDate());
  const dates=[];
  let cur=new Date(baseBooking.date+"T12:00:00");
  while(cur<=oneYearOut){
    dates.push(cur.toISOString().split("T")[0]);
    cur=new Date(cur.getTime()+intervalDays*24*60*60*1000);
  }
  let savedFirst=false,skipped=0;
  for(const date of dates){
    const b={...baseBooking,date,seriesId,seriesInterval:intervalDays,at:new Date().toISOString()};
    const ref=await fbSaveOne(b);
    if(ref){if(!savedFirst)savedFirst=true;}
    else skipped++;
  }
  if(!savedFirst) throw new Error("SLOT_TAKEN");
  return {seriesId,total:dates.length,skipped};
}

async function fbExtendSeries(seriesId,seriesInterval,baseBooking){
  const snap=await db.collection("bookings").where("seriesId","==",seriesId).get();
  if(snap.empty) return;
  const dates=snap.docs.map(d=>d.data().date).sort();
  const latest=dates[dates.length-1];
  const oneYearOut=new Date();
  oneYearOut.setFullYear(oneYearOut.getFullYear()+1);
  let cur=new Date(latest+"T12:00:00");
  cur=new Date(cur.getTime()+seriesInterval*24*60*60*1000);
  while(cur<=oneYearOut){
    const date=cur.toISOString().split("T")[0];
    const b={...baseBooking,date,seriesId,seriesInterval,at:new Date().toISOString()};
    await fbSaveOne(b);
    cur=new Date(cur.getTime()+seriesInterval*24*60*60*1000);
  }
}

async function fbDeleteOne(id){
  const snap=await db.collection("bookings").doc(id).get();
  if(!snap.exists) return db.collection("bookings").doc(id).delete();
  const b=snap.data();
  const slots=slotsForBooking(b);
  const batch=db.batch();
  batch.delete(db.collection("bookings").doc(id));
  slots.forEach(s=>batch.delete(db.collection("_locks").doc(s)));
  return batch.commit();
}

async function fbDeleteSeries(seriesId){
  const snap=await db.collection("bookings").where("seriesId","==",seriesId).get();
  const docs=snap.docs;
  for(let i=0;i<docs.length;i+=400){
    const batch=db.batch();
    const chunk=docs.slice(i,i+400);
    for(const doc of chunk){
      const b=doc.data();
      const slots=slotsForBooking(b);
      batch.delete(db.collection("bookings").doc(doc.id));
      slots.forEach(s=>batch.delete(db.collection("_locks").doc(s)));
    }
    await batch.commit();
  }
}

function extractCalendarId(url){
  if(!url)return null;
  const m=url.match(/\/ical\/([^\/]+)\//);
  if(m)return decodeURIComponent(m[1]);
  if(url.includes("@"))return url.trim();
  return null;
}
async function fetchGCal(url){
  if(!url)return[];const calId=extractCalendarId(url);if(!calId)return null;
  try{
    const now=new Date().toISOString();
    const ep=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events?key=${GCAL_KEY}&timeMin=${now}&singleEvents=true&maxResults=500&orderBy=startTime`;
    const r=await fetch(ep);if(!r.ok){console.error("GCal",r.status);return null;}
    const data=await r.json();
    return(data.items||[]).filter(e=>e.status!=="cancelled").map(e=>{
      const rawS=e.start.dateTime||e.start.date+"T00:00:00",rawE=e.end.dateTime||e.end.date+"T23:59:59";
      const sMs=new Date(rawS).getTime(),eMs=Math.max(new Date(rawE).getTime(),sMs+15*60*1000);
      return{title:e.summary||"",start:new Date(sMs).toISOString(),end:new Date(eMs).toISOString()};
    });
  }catch(e){console.error("GCal err",e);return null;}
}

function genSlots(ds,serviceDur,calEvents,appBookings,cfg){
  const[y,m,d]=ds.split("-").map(Number);
  const dow=new Date(y,m-1,d).getDay();
  const dh=(cfg.dayHours||{})[dow];
  if(!dh||!dh.open)return[];
  const startMin=dh.start*60,endMin=dh.end*60,slots=[];
  for(let off=0;off<=endMin-startMin-serviceDur;off+=15){
    const slotS=startMin+off,slotE=slotS+serviceDur;
    const dtS=new Date(y,m-1,d,Math.floor(slotS/60),slotS%60),dtE=new Date(y,m-1,d,Math.floor(slotE/60),slotE%60);
    if((calEvents||[]).some(ev=>{const evS=new Date(ev.start),evE=new Date(ev.end);return dtS<evE&&dtE>evS;}))continue;
    if((appBookings||[]).some(b=>{
      if(!b.date||!b.time)return false;
      const[by,bm,bd]=b.date.split("-").map(Number);if(by!==y||bm!==m||bd!==d)return false;
      const[bh,bmi]=b.time.split(":").map(Number);
      const bSvc=SERVICES.find(s=>s.name===b.service),bDur=bSvc?bSvc.duration:30;
      const bS=new Date(y,m-1,d,bh,bmi),bE=new Date(bS.getTime()+bDur*60*1000);
      return dtS<bE&&dtE>bS;
    }))continue;
    if(dtS<=new Date())continue;
    slots.push(`${String(Math.floor(slotS/60)).padStart(2,"0")}:${String(slotS%60).padStart(2,"0")}`);
  }
  return slots;
}

function BookForm({allBookings,settings}){
  const[step,setStep]=useState(0);const[svc,setSvc]=useState(null);const[date,setDate]=useState("");const[time,setTime]=useState("");
  const[form,setForm]=useState({name:"",phone:"",notes:"",recurring:"One-time"});const[errors,setErrors]=useState({});
  const[slots,setSlots]=useState([]);const[loading,setLoading]=useState(false);const[calWarn,setCalWarn]=useState(false);
  const[nextAvail,setNextAvail]=useState(null);const[searchingNext,setSearchingNext]=useState(false);
  const[saving,setSaving]=useState(false);const[last,setLast]=useState(null);
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));
  useEffect(()=>{
    if(!date||!svc)return;setSlots([]);setTime("");setLoading(true);setCalWarn(false);
    (async()=>{let ce=[];if(settings.calUrl){const r=await fetchGCal(settings.calUrl);if(r===null)setCalWarn(true);else ce=r;}setSlots(genSlots(date,svc.duration,ce,allBookings,settings));setLoading(false);})();
  },[date,svc]);
  useEffect(()=>{
    if(!svc)return;
    setNextAvail(null);setSearchingNext(true);
    (async()=>{
      let ce=[];
      if(settings.calUrl){const r=await fetchGCal(settings.calUrl);if(r&&r.length)ce=r;}
      const today=new Date();
      for(let d=0;d<14;d++){
        const dt=new Date(today);dt.setDate(today.getDate()+d);
        const ds=dt.toISOString().split("T")[0];
        const slots=genSlots(ds,svc.duration,ce,allBookings,settings);
        if(slots.length>0){setNextAvail({date:ds,time:slots[0]});break;}
      }
      setSearchingNext(false);
    })();
  },[svc]);
  const validate=()=>{const e={};if(!form.name.trim())e.name="Required";if(!form.phone.trim())e.phone="Required";setErrors(e);return!Object.keys(e).length;};
  const submit=async()=>{
    if(!validate())return;setSaving(true);
    try{
      const b={...form,service:svc.name,price:svc.price,date,time,at:new Date().toISOString()};
      const isRecurring=form.recurring&&form.recurring!=="One-time";
      if(isRecurring){await fbSaveSeries(b);}else{await fbSave(b);}
      setLast(b);
      if(settings.oneSignalAppId&&settings.oneSignalApiKey){
        const dispDate=new Date(date+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
        const dispTime=fmt12(time);
        await sendPush(settings,"💈 New Booking!",`${b.name} booked ${svc.name} — ${dispDate} at ${dispTime}${isRecurring?" ("+form.recurring+")":" "}`);
        const remISO=getReminderISO(date);

        setTimeout(()=>promptPush(),1500);
      }
      setStep(3);
    }catch(e){
      if(e.message==="SLOT_TAKEN"){alert("⚠️ Sorry, that time slot was just taken by someone else! Please go back and pick a different time.");setTime("");setStep(1);}
      else{alert("Couldn't save — check connection.");}
    }
    setSaving(false);
  };

        <div style={{fontSize:46,marginBottom:10}}>💈</div>
        <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:26,letterSpacing:3,color:C.text,marginBottom:4}}>SHEAR PERFECTION</div>

        {SERVICES.map(s=>(
          <div key={s.name} onClick={()=>{setSvc(s);setStep(1);}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 16px",borderBottom:"1px solid #1a1a1a",cursor:"pointer",touchAction:"manipulation"}} onMouseEnter={e=>e.currentTarget.style.background="#1e1e1e"} onMouseLeave={e=>e.currentTarget.style.background="transparent"} onTouchStart={e=>e.currentTarget.style.background="#1e1e1e"} onTouchEnd={e=>e.currentTarget.style.background="transparent"}>

        <div style={{display:"flex",gap:10,marginTop:4}}>

function Dashboard({bookings,settings}){
  const[deleting,setDeleting]=useState(null);
  const[deleteModal,setDeleteModal]=useState(null);
  const[extending,setExtending]=useState(false);
  const[gcalEvents,setGcalEvents]=useState([]);
  useEffect(()=>{
    if(!bookings.length)return;
    const oneYearOut=new Date();oneYearOut.setFullYear(oneYearOut.getFullYear()+1);
    const oneYearStr=oneYearOut.toISOString().split("T")[0];
    const seriesMap={};
    bookings.forEach(b=>{if(!b.seriesId)return;if(!seriesMap[b.seriesId])seriesMap[b.seriesId]={latest:"",booking:b};if(b.date>seriesMap[b.seriesId].latest)seriesMap[b.seriesId].latest=b.date;});
    const toExtend=Object.entries(seriesMap).filter(([,v])=>v.latest<oneYearStr);
    if(!toExtend.length)return;
    setExtending(true);
    (async()=>{for(const[,v]of toExtend){const b=v.booking;if(!b.seriesInterval)continue;try{await fbExtendSeries(b.seriesId||"",b.seriesInterval,b);}catch(e){console.error("extend",e);}}setExtending(false);})();
  },[bookings.length]);
  useEffect(()=>{if(!settings.calUrl)return;fetchGCal(settings.calUrl).then(evs=>setGcalEvents(evs||[]));},[settings.calUrl]);
  const confirmDelete=(id,seriesId,name)=>{if(seriesId)setDeleteModal({id,seriesId,name});else doDeleteOne(id);};
  const doDeleteOne=async id=>{setDeleting(id);setDeleteModal(null);try{await fbDeleteOne(id);}catch{alert("Couldn't delete.");}setDeleting(null);};
  const doDeleteSeries=async seriesId=>{setDeleteModal(null);setDeleting(seriesId);try{await fbDeleteSeries(seriesId);}catch{alert("Couldn't delete series.");}setDeleting(null);};
  const[weekOffset,setWeekOffset]=useState(0);
  const now=new Date();
  const dow=now.getDay();
  const diffToMon=dow===0?-6:1-dow;
  const weekStart=new Date(now);weekStart.setDate(now.getDate()+diffToMon+(weekOffset*7));weekStart.setHours(0,0,0,0);
  const weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+6);weekEnd.setHours(23,59,59,999);
  const weekStartStr=weekStart.toISOString().split("T")[0];
  const weekEndStr=weekEnd.toISOString().split("T")[0];
  const isCurrentWeek=weekOffset===0;
  const todayISO=todayStr();
  const td=new Date().toDateString();
  const todayN=bookings.filter(b=>{try{return new Date(b.at).toDateString()===td;}catch{return false;}}).length;
  const recN=new Set(bookings.filter(b=>b.seriesId).map(b=>b.seriesId)).size;
  const weekAppBookings=bookings.filter(b=>b.date>=weekStartStr&&b.date<=weekEndStr);
  const weekAppRev=weekAppBookings.reduce((s,b)=>s+(Number(b.price)||0),0);
  const weekGcalCount=gcalEvents.filter(ev=>{
    const ds=ev.start.split("T")[0];
    if(ds<weekStartStr||ds>weekEndStr)return false;
    const gcalTime=ev.start.includes("T")?new Date(ev.start).toTimeString().slice(0,5):null;
    const alreadyBooked=weekAppBookings.some(b=>{
      if(b.date!==ds||!gcalTime)return false;
      const[bh,bm]=b.time.split(":").map(Number);
      const[gh,gm]=gcalTime.split(":").map(Number);
      return Math.abs((bh*60+bm)-(gh*60+gm))<=15;
    });
    return !alreadyBooked;
  }).length;
  const weekRev=weekAppRev+(weekGcalCount*40);
  const upcomingAll=bookings.filter(b=>b.date>=todayISO).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const seenSeries=new Set();
  const upcoming=upcomingAll.filter(b=>{if(!b.seriesId)return true;if(seenSeries.has(b.seriesId))return false;seenSeries.add(b.seriesId);return true;});
  const past=bookings.filter(b=>b.date<todayISO).sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time)).slice(0,5);
  const weekLabel=`${weekStart.toLocaleDateString("en-US",{month:"short",day:"numeric"})} – ${weekEnd.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;
  return(
    <div style={{height:"100%",overflowY:"auto",background:C.bg,padding:16}}>
      {deleteModal&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"#161616",border:`1px solid ${C.red}`,padding:24,width:"100%",maxWidth:340}}>
            <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:18,letterSpacing:2,color:C.text,marginBottom:8}}>DELETE APPOINTMENT</div>
            <div style={{fontSize:13,color:"#aaa",marginBottom:20,lineHeight:1.7}}><strong style={{color:"#f0ebe3"}}>{deleteModal.name}</strong> has a recurring series. What would you like to delete?</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <Btn onClick={()=>doDeleteOne(deleteModal.id)} style={{padding:"13px",background:"#1a1a1a",color:"#f0ebe3",border:`1px solid ${C.border}`,fontSize:14,fontFamily:"inherit",textAlign:"left"}}>
                <div style={{fontWeight:700}}>Just this appointment</div>
                <div style={{fontSize:11,color:"#888",marginTop:2}}>Remove only this date, keep the rest</div>
              </Btn>
              <Btn onClick={()=>doDeleteSeries(deleteModal.seriesId)} style={{padding:"13px",background:"#1a0000",color:"#ff6b6b",border:`1px solid ${C.red}`,fontSize:14,fontFamily:"inherit",textAlign:"left"}}>
                <div style={{fontWeight:700}}>Entire series</div>
                <div style={{fontSize:11,color:"#aa4444",marginTop:2}}>Remove all recurring appointments for this client</div>
              </Btn>
              <Btn onClick={()=>setDeleteModal(null)} style={{padding:"11px",background:"none",color:"#888",border:`1px solid ${C.border}`,fontSize:13,fontFamily:"inherit"}}>Cancel</Btn>
            </div>
          </div>
        </div>
      )}
      <div style={{marginBottom:16}}>
        <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:24,letterSpacing:3,color:C.text}}>ESTEBAN'S <span style={{color:C.red}}>DASHBOARD</span></div>
        <div style={{fontSize:10,color:C.dim,letterSpacing:2}}>🔴 LIVE · SYNCS ACROSS ALL DEVICES{extending&&" · extending series..."}</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:18}}>
        {[{l:"Total Bookings",v:bookings.length},{l:"Today",v:todayN},{l:"Recurring Clients",v:recN}].map(s=>(
          <div key={s.l} style={{background:C.card,border:`1px solid ${C.border}`,padding:"12px 14px"}}>
            <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:30,color:C.red,lineHeight:1}}>{s.v}</div>
            <div style={{fontSize:10,color:"#888",letterSpacing:1,textTransform:"uppercase",marginTop:3}}>{s.l}</div>
          </div>
        ))}
        <div style={{background:C.card,border:`1px solid ${C.border}`,padding:"12px 14px",gridColumn:"span 2"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
            <div style={{fontSize:10,color:"#888",letterSpacing:1,textTransform:"uppercase"}}>Est. Week Revenue</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <Btn onClick={()=>setWeekOffset(o=>o-1)} style={{background:"#1a1a1a",color:"#ccc",border:`1px solid ${C.border}`,padding:"3px 10px",fontSize:14,lineHeight:1}}>‹</Btn>
              <span style={{fontSize:10,color:isCurrentWeek?C.red:"#888",fontWeight:700,minWidth:90,textAlign:"center"}}>{isCurrentWeek?"THIS WEEK":weekOffset<0?`${Math.abs(weekOffset)}W AGO`:`+${weekOffset}W`}</span>
              <Btn onClick={()=>setWeekOffset(o=>o+1)} style={{background:"#1a1a1a",color:"#ccc",border:`1px solid ${C.border}`,padding:"3px 10px",fontSize:14,lineHeight:1}}>›</Btn>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between"}}>
            <div>
              <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:36,color:C.red,lineHeight:1}}>${weekRev}</div>
              <div style={{fontSize:9,color:"#555",marginTop:3}}>{weekLabel}</div>
              {weekGcalCount>0&&<div style={{fontSize:9,color:"#7ab8ff",marginTop:2}}>{weekAppBookings.length} app + {weekGcalCount} gcal × $40</div>}
            </div>
            {!isCurrentWeek&&<Btn onClick={()=>setWeekOffset(0)} style={{background:"none",color:C.red,border:`1px solid ${C.red}`,padding:"4px 10px",fontSize:10,fontFamily:"inherit"}}>Today</Btn>}
          </div>
        </div>
      </div>
      {bookings.length===0?(
        <div style={{textAlign:"center",padding:"40px 20px",border:`1px dashed ${C.border}`,color:"#666"}}>
          <div style={{fontSize:32,marginBottom:8}}>📅</div>
          <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:18,letterSpacing:2,marginBottom:4}}>NO BOOKINGS YET</div>
          <div style={{fontSize:13}}>Share your link so clients can start booking!</div>
        </div>
      ):(
        <div>
          {upcoming.length>0&&(
            <div>
              <div style={{fontSize:10,color:C.red,letterSpacing:2,fontWeight:700,marginBottom:8,textTransform:"uppercase"}}>Upcoming ({upcoming.length})</div>
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>{upcoming.map(b=>renderBookingCard(b,deleting,deleteModal,confirmDelete))}</div>
            </div>
          )}
          {past.length>0&&(
            <div>
              <div style={{fontSize:10,color:"#555",letterSpacing:2,fontWeight:700,marginBottom:8,textTransform:"uppercase"}}>Recent Past</div>
              <div style={{display:"flex",flexDirection:"column",gap:8,opacity:0.5}}>{past.map(b=>renderBookingCard(b,deleting,deleteModal,confirmDelete))}</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function renderBookingCard(b,deleting,deleteModal,confirmDelete){
  const sv=SERVICES.find(s=>s.name===b.service);
  const isDeleting=deleting===b._id||deleting===b.seriesId;
  return(
    <div key={b._id} style={{background:"#161616",border:`1px solid #222`,padding:"14px",display:"flex",gap:10,alignItems:"flex-start"}}>
      <div style={{width:3,alignSelf:"stretch",background:b.seriesId?"#2a6aaa":"#8B0000",flexShrink:0}}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",justifyContent:"space-between",gap:6,alignItems:"flex-start"}}>
          <div><div style={{fontWeight:700,fontSize:15,color:"#f0ebe3"}}>{b.name}</div><div style={{fontSize:12,color:"#888",marginTop:2}}>{b.phone}</div></div>
          <div style={{background:"#8B0000",color:"#fff",fontSize:11,fontWeight:700,padding:"3px 8px",flexShrink:0}}>${b.price}</div>
        </div>
        <div style={{fontSize:13,color:"#bbb",marginTop:5}}>{b.service}</div>
        <div style={{display:"flex",gap:12,marginTop:5,flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:"#888"}}>📅 {b.date}</span>
          <span style={{fontSize:12,color:"#888"}}>🕐 {fmt12(b.time)}</span>
          {sv&&<span style={{fontSize:12,color:"#888"}}>⏱ {sv.duration} min</span>}
        </div>
        {b.seriesId&&<div style={{fontSize:11,color:"#7ab8ff",marginTop:4}}>🔁 {b.recurring} · recurring series</div>}
        {!b.seriesId&&b.recurring&&b.recurring!=="One-time"&&<div style={{fontSize:11,color:"#4caf50",marginTop:4}}>🔁 {b.recurring}</div>}
        {b.notes&&<div style={{marginTop:7,padding:"5px 10px",background:"#111",fontSize:12,color:"#888",fontStyle:"italic"}}>✂️ {b.notes}</div>}
        <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
          <Btn onClick={()=>dlICS(b)} style={{background:"none",border:"1px solid #1a3a1a",color:"#6fcf6f",padding:"4px 10px",fontSize:11,fontFamily:"inherit"}}>🍎 Apple Cal</Btn>
          <Btn onClick={()=>window.open(gCalLink(b),"_blank")} style={{background:"none",border:"1px solid #1a2a3a",color:"#6fa8ff",padding:"4px 10px",fontSize:11,fontFamily:"inherit"}}>📅 Google Cal</Btn>
        </div>
      </div>
      <Btn onClick={()=>confirmDelete(b._id,b.seriesId,b.name)} disabled={isDeleting} style={{background:"none",border:`1px solid #222`,color:isDeleting?"#333":"#aaa",padding:"6px 9px",fontSize:13,flexShrink:0,fontFamily:"inherit"}}>{isDeleting?"...":"✕"}</Btn>
    </div>
  );
}

      <div style={{padding:"8px 16px",background:"#080808",borderTop:"1px solid #1a1a1a",display:"flex",justifyContent:"flex-end"}}>
        <Btn onClick={()=>setIsOwner(false)} style={{background:"none",color:"#888",fontSize:12,padding:"4px 8px",fontFamily:"inherit"}}>🔓 Exit Owner Mode</Btn>
      </div>
    </div>
  );
  return(
    <div style={{width:"100%",height:"100vh",display:"flex",flexDirection:"column",background:C.bg,color:C.text}}>
      <div style={{flex:1,overflow:"hidden"}}><BookForm allBookings={bookings} settings={settings}/></div>
      <OwnerTap onUnlock={()=>setShowPin(true)}/>
    </div>
  );
}

function OwnerTap({onUnlock}){
  const[taps,setTaps]=useState(0);
  const tap=()=>{const next=taps+1;if(next>=5){setTaps(0);onUnlock();}else{setTaps(next);setTimeout(()=>setTaps(0),2000);}};
  return(<div onClick={tap} style={{height:28,background:"#080808",borderTop:"1px solid #0a0a0a",display:"flex",alignItems:"center",justifyContent:"center",cursor:"default",userSelect:"none"}}><div style={{fontSize:9,color:"#1a1a1a",letterSpacing:2}}>SHEAR PERFECTION</div></div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
